name: explorer-local

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8080
      VITE_HMR_HOST: localhost
      VITE_HMR_CLIENT_PORT: "${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  nats:
    image: nats:2.12.5-alpine
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-explorer}"
      POSTGRES_USER: "${POSTGRES_USER:-explorer}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-explorer}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build: .
    entrypoint: ["api"]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      APP_ENV: development
      SERVICE_NAME: explorer-api
      PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-api
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
      BLOB_STORAGE_DIR: /data/blob-storage
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_RESPONSES_WS_URL: "${OPENAI_RESPONSES_WS_URL:-wss://api.openai.com/v1/responses}"
      OPENAI_ORG_ID: "${OPENAI_ORG_ID:-}"
      OPENAI_PROJECT_ID: "${OPENAI_PROJECT_ID:-}"
    volumes:
      - ./blob-storage:/data/blob-storage
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    entrypoint: ["worker"]
    environment:
      APP_ENV: development
      SERVICE_NAME: explorer-worker
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-worker
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
      BLOB_STORAGE_DIR: /data/blob-storage
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_RESPONSES_WS_URL: "${OPENAI_RESPONSES_WS_URL:-wss://api.openai.com/v1/responses}"
      OPENAI_ORG_ID: "${OPENAI_ORG_ID:-}"
      OPENAI_PROJECT_ID: "${OPENAI_PROJECT_ID:-}"
    volumes:
      - ./blob-storage:/data/blob-storage
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  wsserver:
    build: .
    entrypoint: ["wsserver"]
    ports:
      - "${WS_PORT:-8081}:8081"
    environment:
      SERVICE_NAME: explorer-wsserver
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      PORT: "8081"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-wsserver
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  git:
    build: .
    entrypoint: ["gitservice"]
    environment:
      SERVICE_NAME: explorer-git
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-git
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
      GIT_DATA_DIR: /data/git
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - git_data:/data/git
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  docsplitter:
    build: .
    entrypoint: ["docsplitter"]
    environment:
      SERVICE_NAME: explorer-docsplitter
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-docsplitter
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
      BLOB_STORAGE_DIR: /data/blob-storage
    volumes:
      - ./blob-storage:/data/blob-storage
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  documenthandler:
    build: .
    entrypoint: ["documenthandler"]
    environment:
      SERVICE_NAME: explorer-documenthandler
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NATS_URL: nats://nats:4222
      NATS_CLIENT_NAME: explorer-documenthandler
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-explorer}:${POSTGRES_PASSWORD:-explorer}@postgres:5432/${POSTGRES_DB:-explorer}?sslmode=disable"
      BLOB_STORAGE_DIR: /data/blob-storage
    volumes:
      - ./blob-storage:/data/blob-storage
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  frontend_node_modules:
  nats_data:
  postgres18_data:
  git_data:
